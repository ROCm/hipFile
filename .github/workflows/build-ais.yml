            /bin/bash -c '
              cp -R /mnt/ais /ais
              mkdir /ais/build
            '
      - name: Generate build files for hipFile targeting the AMD platform (${{ matrix.alternate_compilers }})
        run: |
          docker exec \
            -t \
            -w /ais/build \
            ${AIS_CONTAINER_NAME} \
            /bin/bash -c '
              cmake \
                -DCMAKE_CXX_COMPILER=${{ matrix.alternate_compilers }} \
                -DCMAKE_CXX_FLAGS="-Werror" \
                -DCMAKE_HIP_PLATFORM=amd \
                -DBUILD_AIS_DOCS=ON \
                ..
            '
      - name: Build hipFile for the AMD platform (${{ matrix.alternate_compilers }})
        run: |
          docker exec \
            -t \
            -w /ais/build \
            ${AIS_CONTAINER_NAME} \
            /bin/bash -c '
              cmake --build . --parallel
            '
      - name: Cleanup & Stop the Docker container
        if: ${{ always() }}
        run: |
          docker stop ${AIS_CONTAINER_NAME}
  AMD_system_tests:
    runs-on: [linux, AIS]
    needs: compile_on_AMD
    steps:
      - name: Set early AIS CI environment variables
        run: echo "AIS_PR_NUMBER=$(echo ${{ github.ref }} | sed 's|[^0-9]||g')" >> "$GITHUB_ENV"
      - name: Set AIS CI container name
        run: |
          echo "AIS_CONTAINER_NAME=${AIS_PR_NUMBER}_${{ github.job }}_${{ inputs.platform }}" >> "$GITHUB_ENV"
      - name: Fetching code repository...
        uses: actions/checkout@v6
      - name: Authenticating to GitHub Container Registry
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef #v3.6.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # Detach the container and run separate commands to it.
      # Thus we can make separate explicit steps in the Github CI
      # as if we were able to parameterize the container image in the first place.
      - name: Starting Docker Container
        run: |
          docker run \
            -dt \
            --rm \
            --device=/dev/kfd \
            --device=/dev/dri \
            --security-opt seccomp=unconfined \
            --pull always \
            -v ${GITHUB_WORKSPACE}:/mnt/ais:ro \
            -v ${{ env.AIS_MOUNT_PATH }}:/mnt/ais-fs \
            --name ${AIS_CONTAINER_NAME} \
            ${{ inputs.ci_image }}
      - name: Make copy of the code repository and create build directories
        run: |
          docker exec \
            -t \
            ${AIS_CONTAINER_NAME} \
            /bin/bash -c '
              cp -R /mnt/ais /ais
              mkdir /ais/build
            '
      - name: Generate build files for hipFile targeting the AMD platform (amdclang++)
        run: |
          docker exec \
            -t \
            -w /ais/build \
            ${AIS_CONTAINER_NAME} \
            /bin/bash -c '
              cmake \
                -DCMAKE_CXX_COMPILER=amdclang++ \
                -DCMAKE_CXX_FLAGS="-Werror" \
                -DCMAKE_HIP_PLATFORM=amd \
                -DBUILD_AIS_DOCS=ON \
                ..
            '
      - name: Build hipFile for the AMD platform (amdclang++)
        run: |
          docker exec \
            -t \
            -w /ais/build \
            ${AIS_CONTAINER_NAME} \
            /bin/bash -c '
              cmake --build . --parallel
            '
      - name: Run hipFile system tests for the AMD platform (amdclang++)
        run: |
          docker exec \
            -t \
            -w /ais/build \
            ${AIS_CONTAINER_NAME} \
            /bin/bash -c '
              ctest -V -L "system" --parallel
            '
      - name: Stress tests for hipFile targeting the AMD platform (amdclang++)
        run: |
          docker exec \
            -t \
            -w /ais/build \
            ${AIS_CONTAINER_NAME} \
            /bin/bash -c '
              ctest -V -L "stress" --parallel
            '
      - name: Cleanup & Stop the Docker container
        if: ${{ always() }}
        run: |
          docker stop ${AIS_CONTAINER_NAME}
