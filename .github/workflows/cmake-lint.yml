# Run cmake-lint over all the repo's CMake files
name: cmake-lint
on: pull_request
permissions:
  contents: read
jobs:
  cmake-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493 #v4.1.7

      # Update the version to '3.x' when cmake-lint updates
      - name: Set up Python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c #v6.0.0
        with:
          python-version: '3.10'

      - name: Set up cmake-lint
        run: |
          python -m pip install --upgrade pip
          python -m pip install cmakelang

      - name: Lint all CMake files
        run: |
          FILES=$(find . -type f \( -name "CMakeLists.txt" -o -name "*.cmake" \))
          if [ -z "$FILES" ]; then
            echo "No CMake files found!"
            exit 1
          fi
          echo "Linting the following files:"
          echo "$FILES"
          cmakelint $FILES

